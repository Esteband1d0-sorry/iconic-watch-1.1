<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d08a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#c9a84c;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#a8862a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8862a;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#e8d08a;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#c9a84c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4a93a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Background (optional, transparent by default) -->
  <!-- <rect width="480" height="200" fill="#07080b"/> -->

  <!-- Top decorative line -->
  <line x1="60" y1="32" x2="200" y2="32" stroke="url(#goldH)" stroke-width="0.7" opacity="0.7"/>
  <line x1="280" y1="32" x2="420" y2="32" stroke="url(#goldH)" stroke-width="0.7" opacity="0.7"/>

  <!-- Diamond mark centered top -->
  <polygon points="240,20 246,28 240,36 234,28" fill="url(#gold)" filter="url(#glow)"/>

  <!-- ICONIC — main logotype -->
  <text
    x="240"
    y="100"
    font-family="'Cormorant Garamond', 'Didot', 'Playfair Display', Georgia, serif"
    font-size="68"
    font-weight="400"
    letter-spacing="22"
    text-anchor="middle"
    fill="url(#gold)"
    filter="url(#shadow)"
    dominant-baseline="middle">ICONIC</text>

  <!-- Thin rule under ICONIC -->
  <line x1="80" y1="122" x2="400" y2="122" stroke="url(#goldH)" stroke-width="0.5" opacity="0.6"/>

  <!-- Small diamonds on the rule -->
  <polygon points="240,119 243,122 240,125 237,122" fill="url(#gold)" opacity="0.9"/>

  <!-- WATCH — subtitle -->
  <text
    x="240"
    y="152"
    font-family="'Space Grotesk', 'Gill Sans', 'Futura', Arial, sans-serif"
    font-size="13"
    font-weight="600"
    letter-spacing="14"
    text-anchor="middle"
    fill="url(#gold)"
    opacity="0.85"
    dominant-baseline="middle">WATCH</text>

  <!-- Bottom decorative line -->
  <line x1="60" y1="172" x2="200" y2="172" stroke="url(#goldH)" stroke-width="0.7" opacity="0.5"/>
  <line x1="280" y1="172" x2="420" y2="172" stroke="url(#goldH)" stroke-width="0.7" opacity="0.5"/>

  <!-- Small corner marks -->
  <rect x="58" y="28" width="6" height="0.8" fill="url(#gold)" opacity="0.6"/>
  <rect x="58" y="28" width="0.8" height="6" fill="url(#gold)" opacity="0.6"/>
  <rect x="416" y="28" width="6" height="0.8" fill="url(#gold)" opacity="0.6"/>
  <rect x="415.2" y="28" width="0.8" height="6" fill="url(#gold)" opacity="0.6"/>
  <rect x="58" y="166" width="6" height="0.8" fill="url(#gold)" opacity="0.6"/>
  <rect x="58" y="166" width="0.8" height="6" fill="url(#gold)" opacity="0.6"/>
  <rect x="416" y="166" width="6" height="0.8" fill="url(#gold)" opacity="0.6"/>
  <rect x="415.2" y="160" width="0.8" height="6" fill="url(#gold)" opacity="0.6"/>
</svg>
